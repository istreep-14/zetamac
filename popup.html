<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #f8f9fa;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e9ecef;
    }
    
    .title {
      font-size: 18px;
      font-weight: 600;
      color: #212529;
      margin: 0;
    }
    
    .subtitle {
      font-size: 12px;
      color: #6c757d;
      margin: 5px 0 0 0;
    }
    
    .config-section {
      margin-bottom: 20px;
    }
    
    .section-title {
      font-weight: 600;
      color: #495057;
      margin-bottom: 10px;
    }
    
    .input-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      font-size: 12px;
      color: #6c757d;
      margin-bottom: 5px;
    }
    
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      margin-bottom: 10px;
    }
    
    button:hover {
      background: #0056b3;
    }
    
    button.secondary {
      background: #6c757d;
    }
    
    button.secondary:hover {
      background: #545b62;
    }
    
    .stats-section {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid #e9ecef;
    }
    
    .stat-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .stat-item:last-child {
      margin-bottom: 0;
    }
    
    .stat-label {
      color: #6c757d;
      font-size: 12px;
    }
    
    .stat-value {
      font-weight: 600;
      color: #212529;
    }
    
    .status {
      text-align: center;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 15px;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">🎯 Zetamac Coach</h1>
    <p class="subtitle">Smart Performance Tracking</p>
  </div>

  <div id="status-message" class="status" style="display: none;"></div>

  <div class="config-section">
    <div class="section-title">Google Sheets Integration</div>
    <div class="input-group">
      <label for="sheets-url">Apps Script Web App URL:</label>
      <input type="url" id="sheets-url" placeholder="https://script.google.com/...">
    </div>
    <button id="save-settings">Save Settings</button>
    <button id="test-connection" class="secondary">Test Connection</button>
  </div>

  <div class="stats-section">
    <div class="section-title">Recent Stats</div>
    <div id="stats-content">
      <div class="stat-item">
        <span class="stat-label">Total Sessions:</span>
        <span class="stat-value" id="total-sessions">-</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Best Score:</span>
        <span class="stat-value" id="best-score">-</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Avg Score:</span>
        <span class="stat-value" id="avg-score">-</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Total Questions:</span>
        <span class="stat-value" id="total-questions">-</span>
      </div>
    </div>
  </div>

  <button id="clear-data" class="secondary">Clear Local Data</button>

  <script src="popup.js"></script>
</body>
</html>
